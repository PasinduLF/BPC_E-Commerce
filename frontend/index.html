<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO Meta Tags -->
    <title>Beauty P&C – Premium Beauty & Cosmetics Online Store</title>
    <meta name="description" content="Shop premium beauty and cosmetics products at Beauty P&C. Discover skincare, makeup, haircare, and exclusive bundle deals with fast delivery and authentic guarantee." />
    <meta name="keywords" content="beauty products, cosmetics, skincare, makeup, haircare, beauty store, online cosmetics shop, premium beauty, Beauty P&C" />
    <meta name="author" content="Beauty P&C" />
    <meta name="google-site-verification" content="BiidXVcw9fgKciXdUMhTJrmCkCmJC-EkJvv8LF6-tig" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://beautypandc.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beautypandc.com/" />
    <meta property="og:title" content="Beauty P&C – Premium Beauty & Cosmetics Online Store" />
    <meta property="og:description" content="Shop premium beauty and cosmetics products at Beauty P&C. Discover skincare, makeup, haircare, and exclusive bundle deals." />
    <meta property="og:site_name" content="Beauty P&C" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Beauty P&C – Premium Beauty & Cosmetics Online Store" />
    <meta name="twitter:description" content="Shop premium beauty and cosmetics products at Beauty P&C. Discover skincare, makeup, haircare, and exclusive bundle deals." />

    <!-- Theme Color -->
    <meta name="theme-color" content="#e91e63" />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Beauty P&C",
      "url": "https://beautypandc.com",
      "logo": "https://beautypandc.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+94-785-993-262",
        "contactType": "customer service",
        "email": "beautypandc@gmail.com"
      },
      "sameAs": [
        "https://www.facebook.com/beautypanc",
        "https://www.instagram.com/beautypandc",
        "https://www.tiktok.com/@beauty.pc"
      ]
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite (enables Google Sitelinks Search Box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Beauty P&C",
      "url": "https://beautypandc.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://beautypandc.com/shop?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
